{% load static crispy_forms_tags %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
    <style>
        @import url(https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700);
        :root {
            --color-primary: #2563eb;
            --color-secondary: #e8f4fc;
            --color-accent: #7c3aed;
            --color-text: #333;
            --color-bg: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        }
        * {
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 500px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.13);
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .auth-left {
            flex: 1;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #fff;
            text-align: center;
            box-shadow: 4px 0 24px 0 rgba(124, 58, 237, 0.10);
            z-index: 1;
        }
        .auth-left .logo {
            width: 120px;
            margin-bottom: 30px;
            filter: brightness(0) invert(1);
        }
        .auth-left h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .auth-left p {
            font-size: 0.95rem;
            opacity: 0.9;
            line-height: 1.6;
        }
        .auth-left .illustration {
            margin-top: 30px;
            font-size: 5rem;
            opacity: 0.8;
        }
        .auth-right {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 2px 16px 0 rgba(37, 99, 235, 0.07);
            z-index: 2;
        }
        .auth-right h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        .auth-right .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 16px 0 rgba(37, 99, 235, 0.18);
        }
                .form-control {
                    box-shadow: 0 2px 8px 0 rgba(37, 99, 235, 0.08);
                    border: 1.5px solid #e3e8f0;
                    transition: box-shadow 0.2s, border-color 0.2s;
                }
                .form-control:focus {
                    box-shadow: 0 4px 16px 0 rgba(124, 58, 237, 0.15);
                    border-color: #7c3aed;
                }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.25);
        }
        .btn-auth:active {
            transform: translateY(0);
        }
        .auth-links {
            text-align: center;
            margin-top: 25px;
        }
        .auth-links a {
            color: #4a90d9;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        .auth-links a:hover {
            color: #6b8dd6;
            text-decoration: underline;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #999;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e9ecef;
        }
        .divider span {
            padding: 0 15px;
        }
        .form-check {
            margin-bottom: 20px;
        }
        .form-check-input:checked {
            background-color: var(--color-accent);
            border-color: var(--color-accent);
        }
        @media (max-width: 768px) {
            .auth-container {
                flex-direction: column;
                max-width: 100%;
            }
            .auth-left {
                padding: 30px 20px;
            }
            .auth-left .illustration {
                display: none;
            }
            .auth-right {
                padding: 30px 25px;
            }
        }
        /* Crispy forms styling */
        .auth-right label:not(.form-check-label) {
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        .auth-right input[type="text"],
        .auth-right input[type="password"],
        .auth-right input[type="email"] {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }
        .auth-right input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1);
            outline: none;
        }
        .auth-right .mb-3 {
            margin-bottom: 18px !important;
        }
        .errorlist {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 5px;
            list-style: none;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <!-- <img src="{% static 'ressources/logo_ncare.png' %}" alt="Logo" class="logo"> -->
            <h2>Bienvenue !</h2>
            <p>Connectez-vous pour accéder à votre espace .</p>
            <div class="illustration">
                <i class="bi bi-shield-lock"></i>
            </div>
        </div>
        <div class="auth-right">
            <h2>Connexion</h2>
            <p class="subtitle">Entrez vos identifiants pour continuer</p>
            
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Se souvenir de moi</label>
                    </div>
                    <a href="{% url 'accounts:password_reset' %}" style="color: #1e88e5; font-size: 0.9rem;">Mot de passe oublié ?</a>
                </div>
                
                <button type="submit" class="btn-auth">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Se connecter
                </button>
            </form>

            <div class="auth-links">
                <p>Pas encore de compte ? <a href="{% url 'accounts:inscription' %}">Créer un compte</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
