{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email envoyé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
    <style>
        @import url(https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700);
        :root {
            --color-primary: #2563eb;
            --color-accent: #7c3aed;
        }
        * {
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out;
            text-align: center;
            padding: 50px 40px;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: pulse 2s infinite;
        }
        .success-icon i {
            font-size: 3rem;
            color: #fff;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        .message {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .info-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .info-box p {
            color: #555;
            font-size: 0.9rem;
            margin: 0;
        }
        .info-box i {
            color: var(--color-primary);
            margin-right: 8px;
        }
        .btn-auth {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.25);
            color: #fff;
        }
        @media (max-width: 576px) {
            .auth-card {
                padding: 40px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="success-icon">
            <i class="bi bi-envelope-check"></i>
        </div>
        <h2>Vérifiez votre boîte mail</h2>
        <p class="message">
            Si un compte existe avec cette adresse email, vous recevrez un lien de réinitialisation dans quelques instants.
        </p>
        
        <div class="info-box">
            <p><i class="bi bi-info-circle"></i> Pensez à vérifier vos spams si vous ne trouvez pas l'email.</p>
        </div>

        <a href="{% url 'accounts:connexion' %}" class="btn-auth">
            <i class="bi bi-arrow-left"></i>
            Retour à la connexion
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
