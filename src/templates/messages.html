<div
    x-data="{show: true}"
    x-init="setTimeout(() => show = false, 2000)"
    x-show="show"
    x-transition.duration.4000ms
    class="position-fixed top-0 start-50 translate-middle-x"
    style="z-index: 99999;"
>
    {% if messages %}
        {% for message in messages %}
            <div class="toast d-flex align-items-center border-0 mb-2 shadow
                        {% if message.tags == 'success' %}text-bg-success
                        {% elif message.tags == 'danger' or message.tags == 'error' %}text-bg-danger
                        {% elif message.tags == 'warning' %}text-bg-warning
                        {% elif message.tags == 'info' %}text-bg-info
                        {% else %}text-bg-light{% endif %}">
                <div class="toast-body d-flex align-items-center justify-content-between">
                    <!-- Icône sobre selon type  -->
                     <div>
                    {% if message.tags == 'success' %}
                        <svg class="bi bi-check-circle-fill me-2" width="20" height="20" fill="currentColor">
                            <use xlink:href="#check-circle-fill"/>
                        </svg>
                    {% elif message.tags == 'danger' or message.tags == 'error' %}
                        <svg class="bi bi-exclamation-triangle-fill me-2" width="20" height="20" fill="currentColor">
                            <use xlink:href="#exclamation-triangle-fill"/>
                        </svg>
                    {% elif message.tags == 'warning' %}
                        <svg class="bi bi-exclamation-circle-fill me-2" width="20" height="20" fill="currentColor">
                            <use xlink:href="#exclamation-circle-fill"/>
                        </svg>
                    {% elif message.tags == 'info' %}
                        <svg class="bi bi-info-circle-fill me-2" width="20" height="20" fill="currentColor">
                            <use xlink:href="#info-circle-fill"/>
                        </svg>
                    {% endif %}

                    {{ message }}
                    </div>
                    <!-- Bouton de fermeture -->
                    <button type="button" class="btn-close ms-2" @click="show=false" aria-label="Fermer"></button>
                </div>
            </div>
        {% endfor %}
    {% endif %}
</div>
