{% load static %}

          <div class="container">
            <!-- Navigation avec titre et recherche -->
            <nav class="page-header">
              <div class="header-left">
                <div class="burger-menu"><i class="bi bi-list"></i></div>
                <h1 class="page-title">Gestion des Commandes</h1>
              </div>

              <div class="header-right">
                <div class="search-box">
                  <ion-icon name="search-outline"></ion-icon>
                  <input type="search" 
                         name="q" 
                         id="search-commande"
                         placeholder="Rechercher par code..." 
                         hx-get="{% url 'commande:liste-commandes' %}"
                         hx-trigger="keyup changed delay:300ms"
                         hx-target="#liste-biens"
                         hx-include="[name='statut'], [name='fournisseur'], [name='date_debut'], [name='date_fin']"
                         autocomplete="off" />
                </div>

                <div class="user">
                  <div class="avatar">
                    <img src="{% static 'ressources/1.png' %}" alt="" width="50" />
                  </div>
                </div>
              </div>
            </nav>

            <!-- Barre de filtres contextuels -->
            <div class="filter-bar">
              <div class="filter">
                <div class="filter-item">
                  <label for="filter-statut">Statut :</label>
                  <select name="statut" id="filter-statut"
                          hx-get="{% url 'commande:liste-commandes' %}"
                          hx-trigger="change"
                          hx-target="#liste-biens"
                          hx-include="[name='q'], [name='fournisseur'], [name='date_debut'], [name='date_fin']">
                    <option value="">Tous</option>
                    <option value="en_cours">En Cours</option>
                    <option value="terminee">Terminée</option>
                    <option value="annulee">Annulée</option>
                  </select>
                </div>

                <div class="filter-item filter-date">
                  <label for="filter-date-debut">Du :</label>
                  <input type="date" name="date_debut" id="filter-date-debut"
                         hx-get="{% url 'commande:liste-commandes' %}"
                         hx-trigger="change"
                         hx-target="#liste-biens"
                         hx-include="[name='q'], [name='statut'], [name='date_fin']" />
                </div>

                <div class="filter-item filter-date">
                  <label for="filter-date-fin">Au :</label>
                  <input type="date" name="date_fin" id="filter-date-fin"
                         hx-get="{% url 'commande:liste-commandes' %}"
                         hx-trigger="change"
                         hx-target="#liste-biens"
                         hx-include="[name='q'], [name='statut'], [name='date_debut']" />
                </div>

                <div class="filter-actions">
                  <button type="button" class="btn-reset" 
                          onclick="resetFilters('commande')"
                          title="Réinitialiser les filtres">
                    <ion-icon name="refresh-outline"></ion-icon>
                  </button>
                </div>
              </div>
            </div>

            <div class="content">
              <div class="card">
                <div class="table-responsive">
                  <table class="table">
                    <thead>

                        <tr>
                            <th class="text-truncate">Code</th>
                            <th class="text-truncate">Demande</th>
                            <th class="text-truncate">Fournisseur</th>
                            <th class="text-truncate">Etablit le</th>
                            <th class="text-truncate">Articles</th>
                            <th class="text-truncate">Montant total</th>
                            <th class="text-truncate">Statut</th>
                            <th class="text-truncate">Fichier</th>
                            <th class="text-truncate">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="liste-biens" hx-get="{% url 'commande:liste-commandes' %}" hx-trigger="load, refresh-messages from:body" hx-swap="innerHTML">


                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

{% block modal_request %}
<div class="modal_request">
    <button class="new_request"
            hx-get="{% url 'commande:ajouter-commande' %}"
            hx-target="#modal-body"
            hx-swap="innerHTML"
            @click="$dispatch('open-modal')">
        Ajouter une commande
        <ion-icon name="add-circle-outline"></ion-icon>
    </button>
</div>

{% endblock modal_request %}
