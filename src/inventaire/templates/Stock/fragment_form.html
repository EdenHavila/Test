{% load crispy_forms_tags %}

<div class="form-container">
    <div class="form-header">
        <h4 class="form-title">
            <i class="bi bi-{% if stock %}pencil-square{% else %}plus-circle{% endif %} me-2"></i>
            {% if stock %}Modifier ce{% else %}Ajouter un{% endif %} stock
        </h4>
        <p class="form-subtitle text-muted mb-0">
            {% if stock %}Modifiez les informations du stock ci-dessous{% else %}Remplissez les informations pour créer un nouveau stock{% endif %}
        </p>
    </div>
    
    <hr class="my-3">
    
    <form method="post"
          hx-post="{% if is_editing %}{% url 'inventaire:modifier-stock' stock.id %}{% else %}{% url 'inventaire:ajouter-stock' %}{% endif %}"
          hx-target="#modal-body"
          hx-swap="innerHTML"
          class="needs-validation">
        {% csrf_token %}
        {{ form.media }}
        
        {% crispy form %}
        
        <div class="form-actions mt-4 pt-3 border-top">
            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-outline-secondary" onclick="document.querySelector('.modal').classList.remove('active')">
                    <i class="bi bi-x-lg me-1"></i> Annuler
                </button>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-{% if stock %}check-lg{% else %}plus-lg{% endif %} me-1"></i> {{ button_text }}
                </button>
            </div>
        </div>
    </form>
</div>
