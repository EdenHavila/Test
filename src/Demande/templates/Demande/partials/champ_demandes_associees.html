{% load crispy_forms_tags %}

{% if form.demandes_associees %}
<div class="mt-3 p-3 border rounded bg-light shadow-sm">
    <label for="{{ form.demandes_associees.id_for_label }}" class="form-label fw-bold text-primary mb-2">
        <i class="bi bi-link-45deg"></i> Demandes à regrouper
    </label>
    <select 
        name="{{ form.demandes_associees.html_name }}" 
        id="{{ form.demandes_associees.id_for_label }}"
        class="form-select" 
        multiple 
        style="min-height: 120px;"
    >
        {% for choice in form.demandes_associees.field.queryset %}
            <option value="{{ choice.pk }}" {% if choice in form.demandes_associees.value %}selected{% endif %}>
                {{ choice }}
            </option>
        {% endfor %}
    </select>
    <small class="text-muted">Maintenez Ctrl (ou Cmd) pour sélectionner plusieurs demandes.</small>
</div>
{% endif %}
