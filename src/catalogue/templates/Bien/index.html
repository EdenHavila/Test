{% load static %}

          <div class="container">
            <!-- Navigation avec titre et recherche -->
            <nav class="page-header">
              <div class="header-left">
                <div class="burger-menu"><i class="bi bi-list"></i></div>
                <h1 class="page-title">Catalogue des Biens</h1>
              </div>

              <div class="header-right">
                <div class="search-box">
                  <ion-icon name="search-outline"></ion-icon>
                  <input type="search" 
                         name="q" 
                         id="search-catalogue"
                         placeholder="Rechercher par référence ou désignation..." 
                         hx-get="{% url 'catalogue:liste-biens' %}"
                         hx-trigger="keyup changed delay:300ms"
                         hx-target="#liste-biens"
                         hx-include="[name='frequence'], [name='sous_categorie']"
                         autocomplete="off" />
                </div>

                <div class="user">
                  <div class="avatar">
                    <img src="{% static 'ressources/1.png' %}" alt="" width="50" />
                  </div>
                </div>
              </div>
            </nav>

            <!-- Barre de filtres contextuels -->
            
            <!-- ✅ VERSION VANILLA JS (ACTUELLEMENT ACTIVE) -->
            <div class="filter-bar">
            
            <!-- ⭕ VERSION ALPINE.JS (DÉSACTIVÉE - DÉCOMMENTER POUR ACTIVER)
            <div class="filter-bar" x-data="{
              resetFilters() {
                // Réinitialise tous les <select> de la barre de filtres
                document.querySelectorAll('.filter-bar select').forEach(el => el.value = '');
                
                // Réinitialise le champ de recherche
                const searchInput = document.querySelector('#search-catalogue');
                if (searchInput) searchInput.value = '';
                
                // Déclenche HTMX pour recharger la liste avec les filtres vides
                const firstSelect = document.querySelector('.filter-bar select');
                if (firstSelect && typeof htmx !== 'undefined') {
                  htmx.trigger(firstSelect, 'change');
                }
              }
            }">
            -->
            
              <div class="filter">
                <div class="filter-item">
                  <label for="filter-sous-categorie">Sous-catégorie :</label>
                  <select name="sous_categorie" id="filter-sous-categorie"
                          hx-get="{% url 'catalogue:liste-biens' %}"
                          hx-trigger="change"
                          hx-target="#liste-biens"
                          hx-include="[name='q'], [name='frequence']">
                    <option value="">Tous</option>
                    {% for sc in sous_categories %}
                    <option value="{{ sc.id }}">{{ sc.designation }}</option>
                    {% endfor %}
                  </select>
                </div>

                <div class="filter-item">
                  <label for="filter-frequence">Fréquence :</label>
                  <select name="frequence" id="filter-frequence"
                          hx-get="{% url 'catalogue:liste-biens' %}"
                          hx-trigger="change"
                          hx-target="#liste-biens"
                          hx-include="[name='q'], [name='sous_categorie']">
                    <option value="">Tous</option>
                    <option value="hebdomadaire">Hebdomadaire</option>
                    <option value="mensuel">Mensuel</option>
                    <option value="annuel">Annuel</option>
                    <option value="ponctuel">Ponctuel</option>
                  </select>
                </div>

                <div class="filter-actions">
                  
                  <!-- ✅ VERSION VANILLA JS (ACTUELLEMENT ACTIVE) -->
                  <!-- onclick="resetFilters('catalogue')" appelle la fonction globale définie dans script.js -->
                  <button type="button" class="btn-reset" 
                          onclick="resetFilters('catalogue')"
                          title="Réinitialiser les filtres">
                    <ion-icon name="refresh-outline"></ion-icon>
                  </button>
                  
                  <!-- ⭕ VERSION ALPINE.JS (DÉSACTIVÉE - DÉCOMMENTER POUR ACTIVER)
                  <button type="button" class="btn-reset" 
                          @click="resetFilters()"
                          title="Réinitialiser les filtres">
                    <ion-icon name="refresh-outline"></ion-icon>
                  </button>
                  -->
                  
                </div>
              </div>
            </div>

            <div class="content">
              <div class="card">
                <div class="table-responsive">
                  <table class="table">
                    <thead>
                      <tr>
                        <th class="text-truncate">Référence</th>
                        <th class="text-truncate">Sous-catégorie</th>
                        <th class="text-truncate">Désignation</th>
                        <th class="text-truncate">Marque</th>
                        <th class="text-truncate">Modèle</th>
                        <th class="text-truncate">Fréquence</th>
                        <th class="text-truncate">Actions</th>
                      </tr>
                    </thead>
                    <tbody id="liste-biens" hx-get="{% url 'catalogue:liste-biens' %}" hx-trigger="load, refresh-messages from:body" hx-swap="innerHTML">
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

{% block modal_request %}
<div class="modal_request">
    <button class="new_request"
            hx-get="{% url 'catalogue:ajouter-bien' %}"
            hx-target="#modal-body"
            hx-swap="innerHTML"
            @click="$dispatch('open-modal')">
        Ajouter un bien
        <ion-icon name="add-circle-outline"></ion-icon>
    </button>
</div>
{% endblock modal_request %}
